services:
  - type: web
    name: xemirates-bot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    # Add your secret env vars in Render dashboard manually:
    # SHOPIFY_STORE_URL, SHOPIFY_ACCESS_TOKEN, etc.
